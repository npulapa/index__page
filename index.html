<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Poppins", sans-serif;
    background: #f2f2f2; /* simple background color */
  }

  .login-box {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px 35px;
    border-radius: 15px;
    box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
    width: 300px;
    text-align: center;
    animation: fadeIn 1s ease-in-out;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
  }

  input {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    color: #333;
    font-size: 14px;
    transition: 0.3s;
  }

  input::placeholder {
    color: #888;
  }

  input:focus {
    border-color: #00b4d8;
    outline: none;
  }

  button {
    background: linear-gradient(135deg, #00b4d8, #6c63ff);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
    width: 100%;
    transition: background 0.3s ease-in-out, transform 0.2s;
  }

  button:hover {
    background: linear-gradient(135deg, #0096c7, #4b47d1);
    transform: scale(1.03);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>

<body>

<div class="login-box">
  <h2>Student Login</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if (username && password) {
    localStorage.setItem('username', username);

    // Redirect to second website
    window.location.href = "https://npulapa.github.io/student-hub/";

  } else {
    alert('Please enter both username and password.');
  }
}
</script>

</body>
</html>
