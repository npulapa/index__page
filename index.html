```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Poppins", sans-serif;
    background: #f2f2f2;
  }

  .login-box {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px 35px;
    border-radius: 15px;
    box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
    width: 300px;
    text-align: center;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
  }

  input {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    background: linear-gradient(135deg, #00b4d8, #6c63ff);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
  }

</style>

</head>

<body>

<div class="login-box">
  <h2>Student Login</h2>

  <input type="text" id="username" placeholder="Enter Username">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

</div>

<script>

function login(){

let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();

if(username && password){

let time = new Date().toLocaleString();

// get old login data
let users = JSON.parse(localStorage.getItem("loginUsers")) || [];

// add new login
users.push({
name: username,
time: time
});

// save again
localStorage.setItem("loginUsers", JSON.stringify(users));

// redirect
window.location.href="https://npulapa.github.io/student-hub/";

}
else{
alert("Please enter username and password");
}

}

</script>

</body>
</html>
