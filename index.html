<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins;
background:#f2f2f2;
}

.login-box{

}

button{
background:linear-gradient(135deg,#00b4d8,#6c63ff);

padding:10px;

width:100%;
cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyC5GHlCusznXZ-mMe_I86l8QhenPxXDdgA",
  authDomain: "student-login-tracker-40716.firebaseapp.com",
  projectId: "student-login-tracker-40716",
  storageBucket: "student-login-tracker-40716.firebasestorage.app",
  messagingSenderId: "732329668836",
  appId: "1:732329668836:web:51951a1cf63de6c3767cf1",
  measurementId: "G-GK095BM7XS"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.login = async function(){

let username=document.getElementById("username").value.trim();
let password=document.getElementById("password").value.trim();

if(username && password){

let time=new Date().toLocaleString();

await addDoc(collection(db,"logins"),{
name:username,
time:time
});

window.location.href="https://npulapa.github.io/student-hub/";

}
else{
alert("Please enter username and password");
}

}

</script>

</body>
